<div class="max-w-lg mx-auto space-y-6">
  <h1 class="text-2xl font-bold text-gray-800">Export Reports</h1>

  <div class="bg-white rounded-xl shadow-sm p-6 space-y-5">
    <p class="text-sm text-gray-500">
      Select a month and download your expense report as a CSV or PDF file.
    </p>

    @if (errorMessage) {
      <div class="p-3 bg-red-50 text-red-600 text-sm rounded-lg">{{ errorMessage }}</div>
    }

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Month</label>
        <select [(ngModel)]="selectedMonth" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
          @for (m of months; track m.value) {
            <option [value]="m.value">{{ m.label }}</option>
          }
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Year</label>
        <select [(ngModel)]="selectedYear" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
          @for (y of years; track y) {
            <option [value]="y">{{ y }}</option>
          }
        </select>
      </div>
    </div>

    <div class="flex gap-3 pt-2">
      <button (click)="downloadCsv()" [disabled]="downloading() !== null"
              class="flex-1 border border-gray-300 text-gray-700 py-2.5 rounded-lg font-medium text-sm hover:bg-gray-50 disabled:opacity-50 transition">
        {{ downloading() === 'csv' ? 'Downloading...' : 'Download CSV' }}
      </button>

      <button (click)="downloadPdf()" [disabled]="downloading() !== null"
              class="flex-1 bg-blue-600 text-white py-2.5 rounded-lg font-medium text-sm hover:bg-blue-700 disabled:opacity-50 transition">
        {{ downloading() === 'pdf' ? 'Downloading...' : 'Download PDF' }}
      </button>
    </div>
  </div>
</div>
